<!DOCTYPE html>
<html>
<head>
    <title>IDS Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; padding: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; color: #38bdf8; }
        .badge { background: #7f1d1d; color: #f87171; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🛡️ XSS Intrusion Detection Logs</h1>
    <table>
        <tr>
            <th>Time</th>
            <th>Detection Method</th>
            <th>Payload</th>
        </tr>
        {% for log in logs %}
        <tr>
            <td>{{ log.time }}</td>
            <td><span class="badge">{{ log.method }}</span></td>
            <td><code>{{ log.payload }}</code></td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="/" style="color: #38bdf8;">Return to Scanner</a>
</body>
</html>
